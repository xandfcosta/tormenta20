<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap"
    />
    <title>Tormenta 20</title>
    <script>
      // Apply persisted theme before React mounts to avoid FOUC.
      // Mirrors zustand persist key in src/store/ui-store.ts.
      try {
        var raw = localStorage.getItem('t20-ui');
        var theme = raw ? JSON.parse(raw)?.state?.theme : null;
        if (theme === 'dark') document.documentElement.classList.add('dark');
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
