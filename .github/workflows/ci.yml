name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  ci:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Biome lint (with fix)
        run: pnpm exec biome lint --write .

      - name: Fail if lint produced uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::biome lint --write modified files. Run 'pnpm lint:fix' locally and commit the results."
            git diff --stat
            exit 1
          fi

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  visual:
    name: visual regression
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter frontend exec playwright install chromium --with-deps

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Prepare backend .env
        run: |
          cp backend/.env.example backend/.env
          echo "JWT_SECRET=ci-only-fake-secret-value-32-chars" >> backend/.env

      - name: Apply Prisma migrations + seed
        working-directory: backend
        run: |
          pnpm exec prisma migrate deploy
          pnpm run seed

      - name: Boot backend
        working-directory: backend
        run: pnpm run start > backend.log 2>&1 &

      - name: Boot frontend
        working-directory: frontend
        run: pnpm run dev > frontend.log 2>&1 &

      - name: Wait for both servers
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5173/ > /dev/null && curl -sf http://localhost:3000/ > /dev/null; then
              echo "both up"
              exit 0
            fi
            sleep 2
          done
          echo "servers failed to boot" >&2
          echo "--- backend log ---" >&2
          tail -80 backend/backend.log >&2 || true
          echo "--- frontend log ---" >&2
          tail -80 frontend/frontend.log >&2 || true
          exit 1

      - name: Run visual tests
        run: pnpm --filter frontend run test:visual

      - name: Upload failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14
